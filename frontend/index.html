<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Markdown and Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🤖</span>
                    <span class="logo-text">AgentAI</span>
                </div>
                <button class="new-chat-btn">
                    <span>+</span> New Chat
                </button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <p class="nav-label">Recent</p>
                    <div class="history-item active">Current Conversation</div>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <p class="user-name">Guest User</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <div class="chat-container">
                <div class="messages" id="messagesContainer">
                    <div class="message assistant">
                        <div class="avatar">🤖</div>
                        <div class="message-wrapper">
                            <div class="message-content">
                                <p>Hello! I'm your AI assistant. How can I help you today?</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-container">
                        <div id="errorMessage" class="error-message"></div>
                        <div class="input-wrapper">
                            <textarea 
                                id="userInput" 
                                placeholder="Ask me anything..." 
                                autocomplete="off"
                                class="chat-input"
                                rows="1"
                            ></textarea>
                            <button id="sendBtn" class="send-btn" title="Send message (Enter)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">Press Enter or click Send</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
